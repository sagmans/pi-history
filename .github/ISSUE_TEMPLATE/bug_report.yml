name: Bug report
description: Report reproducible incorrect behavior in pi-history
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Bug reports only. Feature requests and support requests are not accepted.
        Report security vulnerabilities privately through the [security policy](https://github.com/sagmans/pi-history/security/policy).
        Never include real prompt contents, credentials, private paths, or other sensitive data.
  - type: input
    id: version
    attributes:
      label: pi-history version
      description: Provide a release tag or commit SHA.
      placeholder: v0.1.1
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include operating system, Node.js version, pi version, and terminal.
      placeholder: |
        OS: macOS 15.5
        Node.js: 22.19.0
        pi: 0.81.1
        Terminal: Terminal.app
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use the smallest deterministic reproduction with synthetic data.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Redacted evidence
      description: Add minimal logs, screenshots, or diagnostics after removing prompts, credentials, and private paths.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed real prompt contents, credentials, private paths, and other sensitive data.
          required: true
